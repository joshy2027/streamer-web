<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Comunidad Streamer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero gamer-hero">
    <h1>Iniciar sesión</h1>
    <p>Accede al panel de comunidad y administración.</p>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="login.html">Login</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="container">
    <section class="card form-card login-card">
      <h2>Acceso al sistema</h2>
      <p class="login-helper">
        Usa tu correo y contraseña para ingresar al panel del streamer.
      </p>

      <div class="demo-box">
        <p><strong>Usuario demo:</strong> admin@streamer.com</p>
        <p><strong>Contraseña demo:</strong> 1234</p>
      </div>

      <form id="loginForm">
        <label for="email">Correo electrónico</label>
        <input
          type="email"
          id="email"
          placeholder="correo@streamer.com"
          required
        />

        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          placeholder="Ingresa tu contraseña"
          required
        />

        <button type="submit">Entrar</button>
      </form>

      <p id="loginMessage"></p>
    </section>
  </main>

  <footer>
    <p>Sistema web para gestión de contenido y comunidad de streamers</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
